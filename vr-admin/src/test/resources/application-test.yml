spring:
  datasource:
    url: jdbc:h2:mem:vr_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql

mybatis:
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: test-secret-key-for-unit-tests-at-least-32-chars
  expiration: 3600000

pagehelper:
  helper-dialect: h2
